name: sync-sources

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        run: npm install -g pnpm@9

      - name: Sync sources
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: pnpm sync:sources

      - name: Commit and push
        run: |
          git config user.name "kasushuku-bot"
          git config user.email "bot@kasushuku.local"
          git add content
          if git diff --cached --quiet; then
            echo "no changes"
            exit 0
          fi
          git commit -m "chore: sync sources [skip ci]"
          git push
